<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo ink -->
  <rect width="32" height="32" fill="#050709"/>
  <!-- Borda amber-bright -->
  <rect width="32" height="32" fill="none" stroke="#F5A623" stroke-width="1.5"/>
  <!-- Cantos técnicos (L-brackets) -->
  <polyline points="0,6 0,0 6,0" fill="none" stroke="#F5A623" stroke-width="1.5"/>
  <polyline points="26,0 32,0 32,6" fill="none" stroke="#F5A623" stroke-width="1.5"/>
  <polyline points="0,26 0,32 6,32" fill="none" stroke="#F5A623" stroke-width="1.5"/>
  <polyline points="26,32 32,32 32,26" fill="none" stroke="#F5A623" stroke-width="1.5"/>
  <!-- NPT em Bebas Neue: N e T chalk, P amber-bright -->
  <text x="4" y="23" font-family="'Bebas Neue', 'Arial Narrow', sans-serif" font-size="18" font-weight="700" fill="#F2EEE8" letter-spacing="0.5">N</text>
  <text x="13" y="23" font-family="'Bebas Neue', 'Arial Narrow', sans-serif" font-size="18" font-weight="700" fill="#F5A623" letter-spacing="0.5">P</text>
  <text x="22" y="23" font-family="'Bebas Neue', 'Arial Narrow', sans-serif" font-size="18" font-weight="700" fill="#F2EEE8" letter-spacing="0.5">T</text>
</svg>
